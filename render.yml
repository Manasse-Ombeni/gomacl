databases:
  - name: gomacl_db
    databaseName: gomacl_db
    user: gomacl_user
    plan: free

services:
  - type: web
    name: goma-champions-league
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn goma_cl.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: DATABASE_URL
        fromDatabase:
          name: gomacl_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: gomacl.onrender.com,localhost,127.0.0.1
      - key: WEB_CONCURRENCY
        value: 4