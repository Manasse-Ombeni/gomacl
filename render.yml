databases:
  - name: gomacl_db
    databaseName: gomacl_db
    user: gomacl_user
    plan: free

services:
  - type: web
    name: goma-champions-league
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn goma_cl.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gomacl_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: ".onrender.com"