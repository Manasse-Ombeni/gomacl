{% load static %}
{% load i18n %}

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">
    <div class="container">

        <!-- ✅ LOGO + NOM -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <div class="logo-wrapper me-2">
                <img src="{% static 'images/logo.png' %}" 
                     alt="Goma CL Logo" 
                     class="navbar-logo">
                <span class="logo-glow"></span>
            </div>

            <div class="brand-text-wrapper">
                <span class="brand-text">
                    GOMA CHAMPIONS LEAGUE
                </span>
                <span class="edition-badge">
                    2026 Edition
                </span>
            </div>
        </a>

        <!-- Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">
                        <i class="fas fa-home me-1"></i> Accueil
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'standings' %}">
                        <i class="fas fa-trophy me-1"></i> Classement
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'fixtures' %}">
                        <i class="fas fa-calendar-alt me-1"></i> Calendrier
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'results' %}">
                        <i class="fas fa-list me-1"></i> Résultats
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'rules' %}">
                        <i class="fas fa-book me-1"></i> Règlement
                    </a>
                </li>

                {% if user.is_authenticated %}
                    {% if user.is_staff %}
                        <li class="nav-item ms-3">
                            <a href="{% url 'dashboard' %}" class="btn btn-warning btn-sm">
                                <i class="fas fa-cog me-1"></i> Dashboard
                            </a>
                        </li>
                    {% endif %}

                    <li class="nav-item ms-2">
                        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                            <i class="fas fa-sign-out-alt me-1"></i> Déconnexion
                        </a>
                    </li>
                {% else %}
                    <li class="nav-item ms-3">
                        <a href="{% url 'register_team' %}" class="btn btn-success btn-sm">
                            <i class="fas fa-user-plus me-1"></i> S'inscrire
                        </a>
                    </li>
                {% endif %}

            </ul>
        </div>
    </div>
</nav>

<style>

/* ✅ NAVBAR BACKGROUND */
.custom-navbar {
    background: linear-gradient(135deg, #081020, #001a33);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

/* ✅ LOGO */
.logo-wrapper {
    position: relative;
    display: inline-block;
}

.navbar-logo {
    height: 45px;
    transition: 0.4s ease;
}

.logo-wrapper:hover .navbar-logo {
    transform: scale(1.1);
}

.logo-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    animation: glowPulse 2.5s infinite;
    pointer-events: none;
}

@keyframes glowPulse {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
}

/* ✅ BRAND TEXT */
.brand-text-wrapper {
    display: flex;
    flex-direction: column;
}

.brand-text {
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 1px;
    color: #ffd700;
}

.edition-badge {
    font-size: 0.7rem;
    color: #ffffff;
    background: #003d82;
    padding: 2px 6px;
    border-radius: 10px;
    margin-top: 2px;
}

/* ✅ NAV LINKS */
.nav-link {
    font-weight: 500;
    color: #ffffff !important;
    transition: 0.3s;
}

.nav-link:hover {
    color: #ffd700 !important;
    transform: translateY(-2px);
}

.nav-link i {
    color: #ffd700;
}

/* ✅ MOBILE */
@media (max-width: 991px) {
    .navbar-logo {
        height: 35px;
    }

    .brand-text {
        font-size: 0.85rem;
    }
}

</style>
