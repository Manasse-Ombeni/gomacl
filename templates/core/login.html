{% extends 'base.html' %}
{% load static %}

{% block title %}Connexion - Goma Champions League 2026{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card">
                    <div class="card-header text-center">
                        <i class="fas fa-lock fa-3x mb-3"></i>
                        <h2 class="mb-0">CONNEXION</h2>
                        <p class="text-muted mt-2">Espace Administrateur</p>
                    </div>
                    
                    <div class="card-body p-4">
                        <form method="post">
                            {% csrf_token %}
                            
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user me-2"></i>Nom d'utilisateur
                                </label>
                                <input type="text" name="username" id="username" class="form-control" required autofocus>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label">
                                    <i class="fas fa-key me-2"></i>Mot de passe
                                </label>
                                <input type="password" name="password" id="password" class="form-control" required>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-sign-in-alt me-2"></i>
                                    SE CONNECTER
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <div class="card-footer text-center">
                        <a href="{% url 'home' %}" class="text-muted">
                            <i class="fas fa-arrow-left me-2"></i>Retour à l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
.login-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    overflow: hidden;
}

.login-card .card-header {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    padding: 2rem;
}

.login-card .card-footer {
    background: #f8f9fa;
    padding: 1rem;
}
</style>
{% endblock %}
