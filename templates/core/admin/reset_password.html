{% extends 'core/admin/base_admin.html' %}

{% block admin_content %}
<div class="admin-card">

  <h4 class="mb-3">{{ title }}</h4>

  <p class="text-light" style="opacity:.85;">
    Compte : <strong>{{ user_obj.username }}</strong>
  </p>

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Nouveau mot de passe</label>
      <input type="password" name="new_password" class="form-control" required minlength="4">
      <small class="text-light" style="opacity:.75;">Donne ce mot de passe au joueur via WhatsApp.</small>
    </div>

    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a href="{% url 'manage_users' %}" class="btn btn-secondary ms-2">Annuler</a>
  </form>

</div>
{% endblock %}
