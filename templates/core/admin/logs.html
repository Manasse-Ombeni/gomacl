{% extends 'base.html' %}

{% block content %}
<section class="py-5">
<div class="container">

<h2>Historique des actions administratives</h2>

<table class="table table-dark table-striped">
<thead>
<tr>
<th>Admin</th>
<th>Action</th>
<th>Date</th>
</tr>
</thead>
<tbody>
{% for log in logs %}
<tr>
<td>{{ log.user.username }}</td>
<td>{{ log.action }}</td>
<td>{{ log.timestamp|date:"d/m/Y H:i" }}</td>
</tr>
{% endfor %}
</tbody>
</table>

</div>
</section>
{% endblock %}
