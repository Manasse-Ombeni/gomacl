{% extends 'core/admin/base_admin.html' %}

{% block admin_content %}

<a href="{% url 'create_user' %}" class="btn btn-success mb-3">
    + Ajouter utilisateur
</a>

<table class="table table-dark table-striped">
<thead>
<tr>
<th>Username</th>
<th>Email</th>
<th>Rôle</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
{% for profile in users %}
<tr>
<td>{{ profile.user.username }}</td>
<td>{{ profile.user.email }}</td>
<td>{{ profile.get_role_display }}</td>
<td>
<a href="{% url 'edit_user' profile.user.id %}" class="btn btn-warning btn-sm">Modifier</a>
<a href="{% url 'delete_user' profile.user.id %}" class="btn btn-danger btn-sm">Supprimer</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>

{% endblock %}
